site_name: ETL Pipelines Documentation
site_description: Documentation des DAGs Airflow pour le pipeline ETL
site_author: Julien C.

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - def_list

extra_css:
  - stylesheets/extra.css

plugins:
  - search

nav:
  - Accueil: index.md
  - DAGs:
    - dag_ventes_csv: dags/ventes-csv.md
    - dag_clients_api: dags/clients-api.md
    - dag_produits_sql: dags/produits-sql.md
    - dag_orchestrator: dags/orchestrator.md
